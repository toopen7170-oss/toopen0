name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant openjdk-17-jdk
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

      # sdkmanager 경로 문제 해결을 위한 심볼릭 링크
      - name: Fix SDK Manager Path
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          sudo chmod +x /usr/local/lib/android/sdk/tools/bin/sdkmanager

      - name: Build with Buildozer
        run: |
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
          USER: root
