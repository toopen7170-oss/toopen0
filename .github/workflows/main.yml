name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential openjdk-17-jdk python3-dev
          pip install --upgrade pip
          # Cython과 Buildozer를 설치합니다.
          pip install "Cython<3.0" buildozer kivy pillow

      - name: Build with Buildozer
        run: |
          # 라이선스 자동 수락을 위한 폴더 생성
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # clean 명령을 제외하고 바로 debug 빌드를 시작합니다.
          # 빌도저가 알아서 필요한 폴더를 만들며 진행할 것입니다.
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Final-v4
          path: bin/*.apk
