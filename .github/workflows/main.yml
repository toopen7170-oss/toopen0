name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 수동 빌드 버튼 추가

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # [추가] 빌드 시작 전 기존 찌꺼기 폴더(.buildozer)를 깨끗하게 삭제합니다.
      - name: Clean previous build artifacts
        run: |
          rm -rf .buildozer/
          rm -rf bin/
          mkdir -p ~/.android && touch ~/.android/repositories.cfg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 자바 버전을 17로 설정 (원래 코드의 중요 설정 유지)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant openjdk-17-jdk
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

      - name: Build with Buildozer
        run: |
          # 라이선스 자동 동의(yes |)와 함께 빌드 시작
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # 서버에 이미 설치된 SDK/NDK 경로를 직접 지정 (에러 방지 핵심)
          ANDROID_SDK_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Final-v6
          path: bin/*.apk
