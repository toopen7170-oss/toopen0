name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer kivy controllo pillow

      - name: Build with Buildozer
        run: |
          # 빌도저를 직접 실행하여 외부 액션 오류를 방지합니다.
          buildozer android debug
        env:
          # 루트 권한 실행 경고 무시
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Package
          path: bin/*.apk
