name: Build APK 215-FINAL-SHIELD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # 최신 호환성을 위해 17 사용

      - name: Build Setup
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant lld libsqlite3-dev
          
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

          # [환경오류 해결] Buildozer 내부 SDK가 아닌 서버 공인 SDK 사용 준비
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # 라이선스 자동 승인
          yes | sdkmanager --licenses || true
          
          export BUILDOZER_ALLOW_KIVY_MASTER=1
          buildozer -v android debug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-Final-S26
          path: bin/*.apk
