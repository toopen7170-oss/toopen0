name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev build-essential openjdk-17-jdk
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow

      - name: Build with Buildozer
        run: |
          # 안드로이드 SDK 라이선스를 강제로 자동 수락하는 설정입니다.
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # 빌도저 실행 (라이선스 자동 수락 옵션 포함)
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          # 라이선스 자동 수락을 위한 핵심 설정
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Final-v2
          path: bin/*.apk
