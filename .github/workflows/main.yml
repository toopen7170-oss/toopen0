name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 자바 버전을 17로 설정 (Gradle 빌드 필수 사항)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow

      - name: Build with Buildozer
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # 이전에 실패한 Gradle 파일을 초기화하기 위해 다시 한번 clean 후 빌드
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # 자바 경로를 17버전으로 강제 지정
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Final-v5
          path: bin/*.apk
