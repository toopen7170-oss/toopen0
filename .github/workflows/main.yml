name: Build APK 215-FINAL-SHIELD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Setup
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant lld libsqlite3-dev
          
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

          # [방어] 폴더가 없으면 생성한 뒤 설정 파일 작성
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

          # SDK 경로 강제 매핑
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # [방어] 라이선스 자동 승인 및 33 버전 도구 설치
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "build-tools;33.0.0" "platforms;android-33"

          buildozer -v android debug
        shell: bash
