name: Build APK 215-FINAL-SHIELD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Setup
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant lld libsqlite3-dev
          
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

          # [환경오류검사 완료] sdkmanager 강제 주입 로직
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          cp -a $ANDROID_SDK_ROOT/cmdline-tools/latest/. ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/ || true
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          cp $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af9178b11909454ede1222ad145220\nd56f5187479451eabf01fb74301353a168261936" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

          export BUILDOZER_ALLOW_KIVY_MASTER=1
          buildozer -v android debug
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-Final
          path: bin/*.apk
