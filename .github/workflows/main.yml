name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          # Cython을 반드시 포함해야 빌드가 진행됩니다.
          pip install "Cython<3.0" buildozer kivy pillow

      - name: Build with Buildozer
        run: |
          # yes 명령어 대신 buildozer 자체의 자동 수락 옵션을 사용하거나 직접 실행합니다.
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Final
          path: bin/*.apk
