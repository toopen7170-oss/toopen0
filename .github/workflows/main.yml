name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant openjdk-17-jdk
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

      - name: Build with Buildozer
        run: |
          # 라이선스 자동 동의 및 빌드 실행
          # yes | 를 사용하지 않고 환경 변수로 라이선스를 통과시킵니다.
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # [핵심] GitHub Actions 기본 SDK 경로를 직접 지정 (로그 기반 확인 경로)
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
          USER: root
          # sdkmanager 경로 충돌 방지
          PATH: /usr/local/lib/android/sdk/cmdline-tools/latest/bin:/usr/local/lib/android/sdk/platform-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
