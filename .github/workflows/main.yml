name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 무료 빌드 환경을 깨끗하게 정리 (캐시 찌꺼기 제거)
      - name: Clean build environment
        run: |
          rm -rf .buildozer/
          rm -rf bin/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant openjdk-17-jdk wget
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

      # [무료 해결책] sdkmanager를 직접 다운로드하여 Buildozer가 찾는 위치에 강제 배치
      - name: Setup Android SDK Tools
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # 구글 공식 무료 도구 다운로드
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          
          # Buildozer의 구형 경로 엔진이 인식하도록 폴더 구조 생성
          # 이 과정이 없으면 sdkmanager를 못 찾아서 에러가 납니다.
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          cp -r cmdline-tools/bin/* $HOME/.buildozer/android/platform/android-sdk/tools/bin/
          
          # 신형 구조도 함께 복사 (보험용)
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          cp -r cmdline-tools/* $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/ || true

      - name: Build with Buildozer
        run: |
          # 모든 라이선스 동의를 자동으로 처리하여 무료 빌드 중단 방지
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Free-Build
          path: bin/*.apk
