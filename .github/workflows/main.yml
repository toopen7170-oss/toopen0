name: Build APK 215-FINAL-SHIELD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Setup
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant lld libsqlite3-dev
          
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

          # [방어] Buildozer가 사용할 SDK 폴더 미리 생성 (중요)
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # [핵심 방어] 라이선스 파일을 물리적으로 미리 생성하여 승인 과정 생략
          echo -e "8933bad161af9178b11909454ede1222ad145220\nd56f5187479451eabf01fb74301353a168261936\n24333f8a63b6825ea9d5513f83c28d0535f61b98" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

          # [방어] 환경 변수 고정
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          export BUILDOZER_ALLOW_KIVY_MASTER=1
          
          # 빌드 실행
          buildozer -v android debug
        shell: bash
