name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean build environment
        run: |
          rm -rf .buildozer/
          rm -rf bin/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant openjdk-17-jdk wget
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

      # [무료 해결 포인트] 시스템에 깔린 SDK를 활용하도록 경로를 미리 생성하고 권한 부여
      - name: Pre-setup Android SDK
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # Buildozer가 스스로 SDK를 구성할 수 있도록 최소한의 경로만 보장
          mkdir -p $HOME/.buildozer/android/platform

      - name: Build with Buildozer
        run: |
          # Broken pipe 에러를 방지하기 위해 buildozer의 자동 수락 기능을 활용
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          # GitHub 서버의 표준 경로를 명시적으로 알려줌
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Success
          path: bin/*.apk
