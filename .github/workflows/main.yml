name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # [추가] 빌드 효율을 높이기 위한 캐시 설정 (502 에러 방지 핵심)
      - name: Cache Buildozer/Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant openjdk-17-jdk wget
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

      # SDK 도구가 없을 경우를 대비한 안전 장치
      - name: Setup Android SDK Tools
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          if [ ! -d "$HOME/.buildozer/android/platform/android-sdk/tools" ]; then
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip commandlinetools-linux-9477386_latest.zip
            mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
            cp -r cmdline-tools/bin/* $HOME/.buildozer/android/platform/android-sdk/tools/bin/
          fi

      - name: Build with Buildozer
        run: |
          # 로그를 더 자세히 보기 위해 log_level을 높여 실행할 수도 있습니다.
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Final
          path: bin/*.apk
