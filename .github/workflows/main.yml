name: Build APK 215-FINAL-SHIELD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Setup and Execution
        run: |
          # [방어] 시스템 패키지 최신화 및 필수 도구 설치
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant lld libsqlite3-dev
          
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

          # [환경 방어] 안드로이드 SDK 경로 수동 강제 매핑
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # [환경 방어] 라이선스 자동 승인 시 발생할 수 있는 파이프 오류 방지
          (yes || true) | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

          # [방어] NoSectionError 방지를 위한 섹션 강제 주입 빌드
          BUILDOZER_WARN_ON_ROOT=0 buildozer -v android debug
        shell: bash
