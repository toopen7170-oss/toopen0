name: Build APK 215-FINAL-SHIELD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Setup
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant lld libsqlite3-dev
          
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

          # [핵심 방어] Buildozer 전용 경로 생성 및 시스템 SDK 복사
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cp -a $ANDROID_SDK_ROOT/cmdline-tools/. ~/.buildozer/android/platform/android-sdk/cmdline-tools/ || true
          
          # [핵심 방어] Buildozer가 찾는 옛날 경로(tools/bin)를 새 경로로 강제 연결
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          # [방어] 라이선스 파일 물리적 주입 (거부 오류 방지)
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af9178b11909454ede1222ad145220\nd56f5187479451eabf01fb74301353a168261936\n24333f8a63b6825ea9d5513f83c28d0535f61b98" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

          # [환경 변수 고정]
          export BUILDOZER_ALLOW_KIVY_MASTER=1
          
          # 빌드 실행
          buildozer -v android debug
        shell: bash
