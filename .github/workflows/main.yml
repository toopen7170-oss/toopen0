name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          # libtinfo5 대신 libtinfo6를 사용하고, 빌드 필수 도구를 최신화했습니다.
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install buildozer kivy pillow

      - name: Build with Buildozer
        run: |
          # 처음 실행 시 사용자 입력을 건너뛰기 위해 yes 명령어를 조합합니다.
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          # 루트 권한 실행 시 발생할 수 있는 오류 방지
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-App-Success
          path: bin/*.apk
