name: Build APK 215-FINAL

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Kill Server Tools & Build (Final Unified Block)
        run: |
          # 1. 시스템 의존성 설치
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential python3-dev ant lld libsqlite3-dev
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer kivy pillow pyjnius

          # 2. 서버 방해 요소 물리적 파괴 및 커맨드 해시 완전 초기화
          sudo rm -f /usr/bin/gradle
          sudo rm -rf /usr/share/gradle
          hash -r

          # 3. 환경 변수 고정 및 런타임 독점
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$HOME/.local/bin:$JAVA_HOME/bin:$PATH
          
          # 4. 청정 빌드 환경 조성
          rm -rf .buildozer
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | sdkmanager --licenses || true

          # 5. 인라인 주입 빌드 (서버 개입 0%)
          hash -r
          JAVA_HOME=$JAVA_HOME_17_X64 \
          GRADLE_HOME="" \
          GRADLE_USER_HOME=$HOME/.gradle \
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN=1 \
          buildozer -v android debug
        shell: bash
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          USER: root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: toopen0-APK
          path: bin/*.apk
